@if (loading) {
  <div class="flex items-center gap-3 py-6 justify-center">
    <div class="spinner border-t-gold-500"></div>
    <span class="text-slate-500 text-sm">Processing request...</span>
  </div>
}
@if (error) {
  <div class="rounded-lg p-4 mt-4 flex items-start gap-3 shadow-lg"
    [class.bg-amber-50]="errorType === 'warning'"
    [class.border-amber-300]="errorType === 'warning'"
    [class.bg-red-50]="errorType !== 'warning'"
    [class.border-red-300]="errorType !== 'warning'"
    [class.border]="true">
    <span class="mt-0.5 flex h-5 w-5 items-center justify-center rounded-full text-xs font-bold text-white shrink-0"
      [class.bg-amber-500]="errorType === 'warning'"
      [class.bg-red-500]="errorType !== 'warning'">!*</span>
    <div>
      <p class="text-sm font-medium"
        [class.text-amber-900]="errorType === 'warning'"
        [class.text-red-700]="errorType !== 'warning'">
        {{ errorType === 'warning' ? 'Request issue' : 'System error' }}
        @if (errorStatusCode) {
          <span>(HTTP {{ errorStatusCode }})</span>
        }
      </p>
      <p class="text-sm mt-1"
        [class.text-amber-800]="errorType === 'warning'"
        [class.text-red-600]="errorType !== 'warning'">{{ error }}</p>
    </div>
  </div>
}
