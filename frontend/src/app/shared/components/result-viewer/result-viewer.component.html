@if (loading) {
  <div class="flex items-center gap-3 py-6 justify-center">
    <div class="spinner border-t-gold-500"></div>
    <span class="text-slate-500 text-sm">Processing request...</span>
  </div>
}
@if (error) {
  <div class="bg-red-100/20 border border-red-800/50 rounded-lg p-4 mt-4 flex items-start gap-3 shadow-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-400 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <div>
      <p class="text-red-400 text-sm font-medium">Operation Failed</p>
      <p class="text-red-300 text-sm mt-1">{{ error }}</p>
    </div>
  </div>
}
