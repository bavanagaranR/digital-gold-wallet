@if (loading) {
  <div class="flex items-center gap-3 py-6 justify-center">
    <div class="spinner border-t-gold-500"></div>
    <span class="text-slate-500 text-sm">Processing request...</span>
  </div>
}
@if (error) {
  <div
    class="rounded-lg p-4 mt-4 flex items-start gap-3 shadow-lg"
    [ngClass]="{
      'border': true,
      'bg-red-100/20 border-red-800/50': errorType === 'danger' || !errorType,
      'bg-amber-100/40 border-amber-600/40': errorType === 'warning'
    }"
  >
    <div
      class="mt-0.5 shrink-0 w-5 h-5 rounded-full border flex items-center justify-center text-xs font-black"
      [ngClass]="{
        'text-red-400 border-red-400': errorType === 'danger' || !errorType,
        'text-amber-700 border-amber-700': errorType === 'warning'
      }"
    >!</div>
    <div>
      <p
        class="text-sm font-medium"
        [ngClass]="{
          'text-red-400': errorType === 'danger' || !errorType,
          'text-amber-800': errorType === 'warning'
        }"
      >
        {{ errorTitle }}
        @if ((statusCode || errorStatusCode) !== null) {
          <span class="ml-2 text-xs font-semibold">HTTP {{ statusCode || errorStatusCode }}</span>
        }
      </p>
      <p
        class="text-sm mt-1"
        [ngClass]="{
          'text-red-300': errorType === 'danger' || !errorType,
          'text-amber-700': errorType === 'warning'
        }"
      >{{ error }}</p>
    </div>
  </div>
}
