<div class="page-container max-w-4xl">
  <app-page-header title="Create User" developer="Pavithra" moduleName="User" method="POST"
    endpoint="/api/v1/users" description="Creates a new user record in the system. Requires name, email and address ID. Returns the created user object with assigned ID." />
  <div class="card bg-gradient-to-br from-white to-beige-50 border-gold-200/50 shadow-2xl">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
        <div class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold text-maroon-400 uppercase tracking-widest mb-2">Full Name *</label>
            <input formControlName="name" class="input-field" placeholder="John Doe" />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-maroon-400 uppercase tracking-widest mb-2">Email *</label>
            <input formControlName="email" type="email" class="input-field" placeholder="john@example.com" />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-maroon-400 uppercase tracking-widest mb-2">Address ID *</label>
            <input formControlName="addressId" type="number" class="input-field" placeholder="123" />
          </div>
        </div>
        <button type="submit" class="btn-primary w-full py-4 !bg-maroon-950 border-gold-500/30 group shadow-xl" [disabled]="loading">
           <span class="flex items-center justify-center gap-3">
             <span class="text-xl group-hover:scale-110 transition-transform">👤</span>
             {{ loading ? 'Creating...' : 'Create User' }}
           </span>
        </button>
      </form>

      <div class="space-y-6">
         <div class="bg-maroon-900 rounded-3xl p-8 border border-gold-500/40 shadow-2xl relative overflow-hidden group">
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-gold-500 opacity-5 blur-3xl group-hover:opacity-10 transition-opacity"></div>
            <h3 class="relative text-gold-500 font-black text-xs uppercase tracking-[0.2em] mb-8">Created User Details</h3>
            
            @if (result && !loading) {
               <div class="animate-fade-in space-y-5">
                  <div class="flex items-center gap-4 mb-6">
                     <div class="w-16 h-16 bg-gradient-to-br from-gold-300 to-gold-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <span class="text-maroon-950 text-2xl font-black">ID</span>
                     </div>
                     <div>
                        <span class="text-gold-500/40 text-[8px] font-bold uppercase tracking-widest block mb-1">User ID</span>
                        <span class="text-gold-100 font-mono text-lg font-black tracking-widest">{{result.userId}}</span>
                     </div>
                  </div>
                  
                  <div class="space-y-4">
                     <div class="flex justify-between items-center py-3 border-b border-gold-500/10">
                        <span class="text-gold-500/50 text-[10px] font-bold uppercase">Name</span>
                        <span class="text-gold-100 font-bold">{{result.name}}</span>
                     </div>
                     <div class="flex justify-between items-center py-3 border-b border-gold-500/10">
                        <span class="text-gold-500/50 text-[10px] font-bold uppercase">Email</span>
                        <span class="text-gold-100 font-bold">{{result.email}}</span>
                     </div>
                  </div>

                  <div class="mt-6 p-4 bg-white/5 rounded-xl border border-gold-500/10">
                     <span class="text-gold-500/40 text-[8px] font-bold uppercase tracking-widest block mb-1">Balance</span>
                     <span class="text-gold-100 text-2xl font-black tracking-tighter">₹{{result.balance || 0 | number:'1.2-2'}}</span>
                  </div>
               </div>
            } @else {
               <div class="py-12 text-center opacity-30">
                  <span class="text-5xl block mb-4">🏛️</span>
                  <p class="text-[10px] font-bold text-gold-500 uppercase tracking-widest">Waiting for details</p>
               </div>
            }
         </div>
      </div>
    </div>
    <app-result-viewer [error]="error" [loading]="loading" />
  </div>
</div>
