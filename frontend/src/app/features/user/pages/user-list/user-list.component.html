<div class="page-container">
  <app-page-header title="List All Users" developer="Pavithra" moduleName="User" method="GET"
    endpoint="/api/v1/users" description="Retrieves all users with pagination support. Use the page/size controls to navigate through results." />
  <div class="card border-gold-200/30 shadow-2xl">
    <div class="flex flex-col md:flex-row items-center gap-6 mb-10 bg-maroon-950 p-6 rounded-2xl border border-gold-500/20">
       <div class="flex gap-4">
          <div class="w-20">
             <label class="block text-[10px] font-bold text-gold-500/70 uppercase tracking-widest mb-2">Page</label>
             <input [(ngModel)]="page" type="number" min="0" class="input-field !bg-maroon-900/50 !border-gold-500/20 !text-gold-100 text-center" />
          </div>
          <div class="w-20">
             <label class="block text-[10px] font-bold text-gold-500/70 uppercase tracking-widest mb-2">Size</label>
             <input [(ngModel)]="size" type="number" min="1" max="100" class="input-field !bg-maroon-900/50 !border-gold-500/20 !text-gold-100 text-center" />
          </div>
       </div>
       <button (click)="load()" class="btn-primary !py-3.5 !px-12 mt-6 md:mt-0 !bg-gold-500 hover:!bg-gold-400 !text-maroon-950 !border-transparent" [disabled]="loading">{{ loading ? '...' : 'Load' }}</button>
    </div>

    @if (users.length) {
      <div class="overflow-hidden rounded-2xl border border-gold-100 shadow-xl">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-maroon-900 text-gold-400 text-[10px] uppercase tracking-[0.2em]">
              <th class="py-5 px-6 text-left font-black">ID</th>
              <th class="py-5 px-6 text-left font-black">Name</th>
              <th class="py-5 px-6 text-left font-black">Email</th>
              <th class="py-5 px-6 text-left font-black">Balance</th>
            </tr>
          </thead>
          <tbody class="bg-white">
            @for (u of users; track u.userId) {
              <tr class="border-b border-gold-100/50 hover:bg-beige-50/50 transition-colors">
                <td class="py-4 px-6 font-mono text-xs text-maroon-400">{{u.userId}}</td>
                <td class="py-4 px-6">
                   <span class="text-maroon-950 font-bold block">{{u.name}}</span>
                </td>
                <td class="py-4 px-6 text-maroon-900/60 font-medium italic">{{u.email}}</td>
                <td class="py-4 px-6">
                   <span class="text-gold-600 font-black text-lg tracking-tighter">₹{{u.balance}}</span>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
      <div class="flex items-center justify-between mt-10 px-2">
        <span class="text-[10px] font-bold text-maroon-400 uppercase tracking-widest">Page {{ page + 1 }} of {{ totalPages }} · {{ totalElements }} total</span>
        <div class="flex gap-3">
          <button (click)="prev()" [disabled]="page===0" class="btn-secondary !py-2 !px-4 text-[10px] font-bold uppercase tracking-widest">← Prev</button>
          <button (click)="next()" [disabled]="page>=totalPages-1" class="btn-secondary !py-2 !px-4 text-[10px] font-bold uppercase tracking-widest">Next →</button>
        </div>
      </div>
    } @else if (!loading) {
       <div class="text-center py-20 opacity-30">
          <span class="text-6xl block mb-4">👥</span>
          <p class="text-xs font-bold text-maroon-900 uppercase tracking-widest">No users found</p>
       </div>
    }
    <app-result-viewer [error]="error" [loading]="loading" />
  </div>
</div>
