<div class="page-container max-w-2xl">
  <app-page-header title="Get Address by ID" developer="Pavithra" moduleName="User" method="GET"
    endpoint="/api/v1/addresses/{id}" description="Fetches a specific address record using its unique ID. Returns all address fields including street, city, state, postal code, and country." />
  <div class="card">
    <div class="flex gap-3">
      <input [(ngModel)]="addressId" type="number" class="input-field" placeholder="Enter Address ID" />
      <button (click)="submit()" class="btn-primary" [disabled]="loading">{{ loading ? '...' : 'Fetch' }}</button>
    </div>
    @if (result && !loading) {
      <div class="mt-6 border border-slate-100 rounded-lg p-4 bg-white/80">
        <h3 class="text-slate-900 font-medium mb-4 border-b border-slate-100 pb-2">Address Details</h3>
        <div class="grid grid-cols-2 gap-4 text-sm">
          <div><span class="text-slate-400 block mb-1">Address ID</span><span class="text-slate-800">{{result.addressId}}</span></div>
          <div><span class="text-slate-400 block mb-1">Street</span><span class="text-slate-800">{{result.street}}</span></div>
          <div><span class="text-slate-400 block mb-1">City</span><span class="text-slate-800">{{result.city}}</span></div>
          <div><span class="text-slate-400 block mb-1">State</span><span class="text-slate-800">{{result.state}}</span></div>
          <div><span class="text-slate-400 block mb-1">Postal Code</span><span class="text-slate-800">{{result.postalCode || '—'}}</span></div>
          <div><span class="text-slate-400 block mb-1">Country</span><span class="text-slate-800">{{result.country}}</span></div>
        </div>
      </div>
    }
    <app-result-viewer [error]="error" [loading]="loading" />
  </div>
</div>
