<div class="page-container max-w-4xl">
  <app-page-header title="Get Transaction by ID" developer="Mirudhula" moduleName="Transaction" method="GET"
    endpoint="/api/v1/transactions/{id}"
    description="Retrieves a single transaction by its unique ID." />
  <div class="card border-gold-200/50 shadow-2xl relative overflow-hidden">
    <div class="absolute -right-20 -top-20 w-64 h-64 bg-gold-500/5 rounded-full blur-3xl"></div>
    <div class="flex flex-col md:flex-row gap-6 items-center mb-10">
      <div class="relative w-full md:w-80">
         <input [(ngModel)]="txId" type="number" class="input-field !pl-24" placeholder="Enter Transaction ID" />
      </div>
      <button (click)="submit()" class="btn-primary !py-3.5 !px-12 uppercase tracking-[0.2em] text-[10px] font-black shadow-gold-500/20" [disabled]="loading">
        {{ loading ? '...' : 'Fetch' }}
      </button>
    </div>

    @if (result && !loading) {
      <div class="animate-fade-in">
        <div class="flex justify-between items-start mb-10 pb-6 border-b border-gold-500/10">
          <div>
            <span class="text-gold-500 text-[10px] font-bold uppercase tracking-widest block mb-1">Transaction ID</span>
            <span class="text-black font-mono text-lg font-black tracking-widest">#{{result.transactionId}}</span>
          </div>
          <span [class]="result.transactionStatus === 'SUCCESS' ? 'bg-green-500/50 text-green-900 border-green-500/30' : 'bg-gold-500/20 text-gold-400 border-gold-500/30'" 
                class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border">
            {{result.transactionStatus}}
          </span>
        </div>

        <div class="grid grid-cols-2 gap-10 mb-10">
          <div>
            <span class="text-gold-500 text-[9px] font-bold uppercase tracking-widest block mb-2">Type</span>
            <span class="text-green-600 font-black text-sm uppercase tracking-widest">{{result.transactionType}}</span>
          </div>
          <div class="text-right">
            <span class="text-black text-[9px] font-bold uppercase tracking-widest block mb-2">Amount</span>
            <span class="text-gold-500 font-black text-3xl tracking-tighter">₹{{result.amount | number:'1.2-2'}}</span>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6 p-6 bg-maroon-900 rounded-2xl border border-gold-500/10 mb-8">
          <div class="border-r border-gold-500 pr-6">
            <span class="text-gold-500 text-[8px] font-bold uppercase tracking-widest block mb-1">User ID</span>
            <span class="text-gold-500 text-xs font-bold font-mono">USR-{{result.userId || '—'}}</span>
          </div>
          <div class="pl-4">
            <span class="text-gold-500 text-[8px] font-bold uppercase tracking-widest block mb-1">Branch ID</span>
            <span class="text-gold-500 text-xs font-bold font-mono">BRN-{{result.branchId || '—'}}</span>
          </div>
        </div>

        <div class="text-center">
          <span class="text-gold-500/30 text-[9px] font-bold font-mono">{{result.createdAt | date:'medium' || '—'}}</span>
        </div>
      </div>
    }
    <app-result-viewer [error]="error" [loading]="loading" />
  </div>
</div>
