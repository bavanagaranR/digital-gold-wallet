<div class="page-container">
  <app-page-header title="Transactions by Type" developer="Mirudhula" moduleName="Transaction" method="GET"
    endpoint="/api/v1/transactions/type/{type}"
    description="Retrieves a list of transactions filtered by type (e.g., BUY_GOLD, SELL_GOLD, WALLET_CREDIT)." />
  <div class="card">
    <div class="flex items-center gap-3 mb-4">
      <select [(ngModel)]="type" class="input-field w-40">
        <option value="">Select Type</option>
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
        <option value="CONVERT_TO_PHYSICAL">CONVERT_TO_PHYSICAL</option>
      </select>
      <div class="flex items-center gap-2"><label class="text-sm text-slate-500">Page:</label><input [(ngModel)]="page" type="number" min="0" class="input-field w-16" /></div>
      <div class="flex items-center gap-2"><label class="text-sm text-slate-500">Size:</label><input [(ngModel)]="size" type="number" min="1" class="input-field w-16" /></div>
      <button (click)="load()" class="btn-primary" [disabled]="loading">{{ loading ? '...' : 'Load' }}</button>
    </div>
    @if (txns.length) {
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-400 border-b border-slate-100"><th class="pb-2 pr-4">ID</th><th class="pb-2 pr-4">User ID</th><th class="pb-2 pr-4">Type</th><th class="pb-2 pr-4">Amount</th><th class="pb-2">Status</th></tr></thead>
          <tbody>
            @for (t of txns; track t.transactionId) {
              <tr class="border-b border-slate-100">
                <td class="py-2 pr-4 text-slate-500">{{t.transactionId}}</td>
                <td class="py-2 pr-4 text-slate-900">{{t.userId || '—'}}</td>
                <td class="py-2 pr-4 text-slate-600">{{t.transactionType}}</td>
                <td class="py-2 pr-4 text-primary-600">₹{{t.amount}}</td>
                <td class="py-2"><span [class]="t.transactionStatus === 'SUCCESS' ? 'text-green-400' : 'text-yellow-400'">{{t.transactionStatus}}</span></td>
              </tr>
            }
          </tbody>
        </table>
      </div>
      <div class="flex justify-between mt-4">
        <span class="text-xs text-slate-400">Page {{ page+1 }} of {{ totalPages }} · {{ totalElements }} total</span>
        <div class="flex gap-2">
          <button (click)="prev()" [disabled]="page===0" class="btn-secondary text-xs px-3">← Prev</button>
          <button (click)="next()" [disabled]="page>=totalPages-1" class="btn-secondary text-xs px-3">Next →</button>
        </div>
      </div>
    }
    <app-result-viewer [error]="error" [loading]="loading" />
  </div>
</div>
