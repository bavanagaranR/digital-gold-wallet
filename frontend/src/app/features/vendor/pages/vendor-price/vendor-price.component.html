<div class="page-container max-w-2xl">
  <app-page-header title="Vendor Gold Price" developer="Caitlyn Mary" moduleName="Vendor" method="GET"
    endpoint="/api/v1/vendors/{id}/price" description="Returns the current gold price per gram set by a specific vendor. Used to calculate transaction values." />
  <div class="card">
    <form (ngSubmit)="submit()" class="mb-4">
      <div class="flex gap-3">
        <input [(ngModel)]="vendorId" name="vendorId" type="number" class="input-field" placeholder="Enter Vendor ID" />
        <button type="submit" class="btn-primary" [disabled]="loading">{{ loading ? '...' : 'Get Price' }}</button>
      </div>
      @if (getVendorIdError()) {
        <p class="mt-2 text-sm text-red-600 flex items-center gap-2"><span class="font-black">!</span><span>{{ getVendorIdError() }}</span></p>
      }
    </form>
    @if (price !== null && !loading) {
      <div class="bg-primary-50 border border-gold-700/40 rounded-xl p-6 text-center">
        <p class="text-slate-500 text-sm">Gold Price Per Gram</p>
        <p class="text-4xl font-heading text-primary-600 mt-1">₹ {{ price | number:'1.2-2' }}</p>
      </div>
    }
    <app-result-viewer [error]="resultError.message" [errorTitle]="resultError.title" [errorType]="resultError.type" [statusCode]="resultError.statusCode" [loading]="loading" />
  </div>
</div>
