<div class="page-container max-w-4xl">
  <app-page-header title="Wallet Debit" developer="Bavanagaran" moduleName="Wallet" method="POST"
    endpoint="/api/v1/wallets/{userId}/debit"
    description="Deducts a specified amount from a user's wallet balance. Used when a user makes a purchase or initiates a withdrawal." />
  <div class="card bg-gradient-to-br from-white to-beige-50 border-gold-200/50 shadow-2xl">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
      <div>
        <div class="mb-6">
          <label class="block text-xs font-bold text-maroon-400 uppercase tracking-widest mb-2">User ID</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gold-600 font-bold">#</span>
            <input [(ngModel)]="userId" type="number" class="input-field !pl-10" placeholder="User ID" />
          </div>
        </div>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-6">
            <label class="block text-xs font-bold text-maroon-400 uppercase tracking-widest mb-2">Amount (₹)</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-red-600 font-bold">₹</span>
              <input formControlName="amount" type="number" step="0.01" class="input-field !pl-10 !border-red-200 focus:!ring-red-500/10 focus:!border-red-500" placeholder="0.00" />
            </div>
          </div>
          <button type="submit" class="btn-danger w-full shadow-xl group" [disabled]="loading">
            <span class="flex items-center justify-center gap-2">
              {{ loading ? '...' : 'Debit' }}
            </span>
          </button>
        </form>
      </div>

       <div class="space-y-4">
        <div class="bg-maroon-50 rounded-2xl p-6 border border-gold-100 shadow-inner">
           <h3 class="text-maroon-900 font-black text-sm uppercase tracking-widest mb-4 flex items-center gap-2">
             <span class="w-1 h-3 bg-red-500 rounded-full"></span>
             Transaction Details
           </h3>
           @if (result && !loading) {
            <div class="animate-fade-in">
              <div class="flex justify-between items-center py-3 border-b border-gold-200/20">
                <span class="text-maroon-900/50 text-xs font-bold uppercase">User ID</span>
                <span class="text-maroon-950 font-black tracking-tight">{{result.userId}}</span>
              </div>
              <div class="flex justify-between items-center py-3 border-b border-gold-200/20">
                <span class="text-maroon-900/50 text-xs font-bold uppercase">Status</span>
                <span class="text-red-600 font-black text-xs uppercase tracking-widest">{{result.transactionStatus || 'SUCCESS'}}</span>
              </div>
              <div class="mt-4 p-4 bg-maroon-950 rounded-xl shadow-lg border border-red-900/30">
                <span class="text-red-400/70 text-[10px] font-bold uppercase tracking-widest block mb-1">Balance</span>
                <span class="text-gold-100 text-3xl font-black tracking-tighter">₹{{result.balance | number:'1.2-2'}}</span>
              </div>
            </div>
           } @else {
             <div class="flex flex-col items-center justify-center py-8 opacity-20">
               <span class="text-5xl mb-2">💸</span>
               <p class="text-[10px] font-bold text-maroon-900 uppercase tracking-widest">Awaiting Transaction</p>
             </div>
           }
        </div>
      </div>
    </div>
    <app-result-viewer [error]="error" [loading]="loading" />
  </div>
</div>
